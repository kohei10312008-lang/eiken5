<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>えいご たんごクイズ｜英検5級</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'BIZ UDPGothic', 'Hiragino Maru Gothic Pro', sans-serif;
    min-height: 100vh;
    background: linear-gradient(160deg, #60C8F5 0%, #B8F0D8 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 16px;
  }
  .card {
    background: #FFFDF4; border-radius: 28px;
    padding: 28px 24px; max-width: 500px; width: 100%;
    box-shadow: 0 8px 40px rgba(26,46,82,0.13);
  }
  .btn {
    width: 100%; border: none; border-radius: 18px;
    padding: 15px; font-size: 18px; font-weight: 900;
    cursor: pointer; margin-bottom: 10px; display: block;
    font-family: inherit;
  }
  .btn-yellow { background: linear-gradient(135deg,#FFD93D,#FF9F1C); color: #1A2E52; box-shadow: 0 4px 16px rgba(255,180,0,0.4); }
  .btn-green  { background: linear-gradient(135deg,#4CAF82,#2E9E6A); color: #fff;     box-shadow: 0 4px 16px rgba(76,175,130,0.4); }
  .btn-ghost  { background: transparent; color: #8AABCC; border: 2px solid #C8DCF0; font-size: 15px; }
  .progress-bar-bg { background: #DDE8F5; border-radius: 8px; height: 10px; overflow: hidden; margin-bottom: 20px; }
  .progress-bar    { height: 100%; border-radius: 8px; background: linear-gradient(90deg,#60C8F5,#4CAF82); transition: width 0.4s; }
  .word-card {
    background: linear-gradient(135deg,#1A2E52,#2E4A82);
    border-radius: 20px; padding: 24px 20px; text-align: center;
    margin-bottom: 20px; cursor: pointer; transition: all 0.15s;
  }
  .word-card:hover { transform: scale(1.01); }
  .word-card.speaking { box-shadow: 0 0 0 4px #FFD93D, 0 8px 24px rgba(26,46,82,0.3); transform: scale(0.99); }
  .word-label { font-size: 11px; color: #8AADD0; letter-spacing: 2px; margin-bottom: 4px; }
  .word-text  { font-size: 46px; font-weight: 900; color: #fff; letter-spacing: 2px; }
  .wave { display:flex; justify-content:center; gap:4px; height:24px; align-items:center; margin-top:8px; }
  .wave span { width:4px; background:#FFD93D; border-radius:2px; animation: wave 0.8s ease-in-out infinite; }
  .wave span:nth-child(2) { animation-delay:.1s; }
  .wave span:nth-child(3) { animation-delay:.2s; }
  .wave span:nth-child(4) { animation-delay:.3s; }
  .wave span:nth-child(5) { animation-delay:.4s; }
  @keyframes wave { 0%,100%{height:4px} 50%{height:20px} }
  .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .opt-btn {
    border-radius: 16px; padding: 14px 8px; font-size: 16px;
    font-weight: 700; cursor: pointer; transition: all 0.15s;
    border: 2px solid #D0E4F5; background: #fff; color: #1A2E52;
    font-family: inherit;
  }
  .opt-btn.correct { background:#E8FFF4; border-color:#4CAF82; color:#1A5A3A; }
  .opt-btn.wrong   { background:#FFF0F0; border-color:#FF6B6B; color:#7A1A1A; }
  .opt-btn:disabled { cursor: default; }
  .feedback { text-align:center; font-size:20px; font-weight:900; margin-bottom:12px; }
  .feedback.correct { color:#4CAF82; }
  .feedback.wrong   { color:#FF6B6B; }
  .answer-list { background:#E8F7FF; border-radius:16px; padding:14px; margin-bottom:20px; max-height:220px; overflow-y:auto; }
  .answer-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid #C8DCF0; font-size:13px; }
  .answer-en  { font-weight:700; color:#1A2E52; min-width:90px; cursor:pointer; text-decoration:underline dotted; }
  .answer-ja  { color:#5A7A9F; flex:1; text-align:center; }
  .tag { background:#60C8F5; color:#1A2E52; border-radius:12px; padding:4px 12px; font-size:12px; font-weight:700; }
  .badge-count { background:#E8FFF4; border-radius:16px; padding:14px; margin-bottom:16px; text-align:center; }
  .toggle-row { background:#E8F7FF; border-radius:14px; padding:12px 16px; margin-bottom:16px; display:flex; align-items:center; justify-content:space-between; }
  .toggle { width:52px; height:28px; border-radius:14px; background:#B0C4D8; position:relative; cursor:pointer; transition:background 0.2s; border:none; }
  .toggle.on { background:#4CAF82; }
  .toggle::after { content:''; width:22px; height:22px; background:#fff; border-radius:50%; position:absolute; top:3px; left:3px; transition:left 0.2s; box-shadow:0 1px 4px rgba(0,0,0,0.2); }
  .toggle.on::after { left:27px; }
  #screen-title, #screen-quiz, #screen-result { display:none; }
  .hidden { display:none !important; }
  .info-box { background:#E8F7FF; border-radius:16px; padding:16px; margin-bottom:16px; }
  .info-row { font-size:14px; color:#3A5A7A; margin-bottom:6px; }
</style>
</head>
<body>
<div class="card">

  <!-- タイトル画面 -->
  <div id="screen-title">
    <div style="text-align:center; margin-bottom:16px;">
      <div style="font-size:64px;">🌈</div>
      <h1 style="font-size:26px;font-weight:900;color:#1A2E52;margin:8px 0 4px;">えいご たんごクイズ</h1>
      <p style="font-size:13px;color:#5A7A9F;margin:0 0 16px;">英検5級レベル</p>
    </div>
    <div class="toggle-row">
      <span style="font-size:14px;font-weight:700;color:#1A2E52;">🔊 もんだいを自動で読む</span>
      <button class="toggle on" id="toggle-auto" onclick="toggleAuto()"></button>
    </div>
    <div class="info-box">
      <p style="font-weight:700;color:#1A2E52;font-size:14px;margin-bottom:10px;">📋 あそびかた</p>
      <p class="info-row">① えいごが読まれる → いみを4つから えらぼう</p>
      <p class="info-row">② えいごカードをタップすると もう一度きける</p>
      <p class="info-row" style="margin-bottom:0;">③ 10もんチャレンジ！何点とれるかな？</p>
    </div>
    <p style="font-size:13px;color:#1A5A3A;font-weight:700;text-align:center;margin-bottom:16px;">✅ <span id="word-count"></span>語 準備完了！</p>
    <button class="btn btn-yellow" onclick="startQuiz()">🚀 クイズをはじめる！</button>
  </div>

  <!-- クイズ画面 -->
  <div id="screen-quiz">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span class="tag" id="quiz-category"></span>
      <span style="font-size:14px;color:#5A7A9F;font-weight:700;" id="quiz-progress"></span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar" id="quiz-bar"></div></div>
    <div class="word-card" id="word-card" onclick="speakCurrent()">
      <p class="word-label" id="word-label">👆 TAP TO LISTEN</p>
      <p class="word-text" id="word-text"></p>
      <div class="wave hidden" id="wave">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <p id="speaker-icon" style="margin-top:8px;font-size:20px;">🔊</p>
    </div>
    <div class="feedback hidden" id="feedback"></div>
    <div class="options-grid" id="options"></div>
    <button class="btn btn-green hidden" id="next-btn" onclick="nextQuestion()">つぎへ →</button>
  </div>

  <!-- 結果画面 -->
  <div id="screen-result">
    <div style="text-align:center;">
      <div style="font-size:60px;" id="result-emoji"></div>
      <h2 style="font-size:22px;font-weight:900;margin:8px 0 4px;" id="result-label"></h2>
      <div style="font-size:64px;font-weight:900;color:#1A2E52;line-height:1;margin:8px 0 4px;" id="result-score"></div>
      <p style="font-size:22px;font-weight:700;margin:4px 0 20px;" id="result-pct"></p>
      <div class="answer-list">
        <p style="font-weight:700;color:#1A2E52;font-size:13px;margin-bottom:8px;">📋 こたえあわせ（英語をタップすると読み上げ）</p>
        <div id="answer-rows"></div>
      </div>
      <button class="btn btn-yellow" onclick="startQuiz()">🔄 もういちど！</button>
      <button class="btn btn-ghost" onclick="showTitle()">🏠 トップにもどる</button>
      <p style="font-size:11px;color:#AABCCC;margin-top:8px;" id="result-total"></p>
    </div>
  </div>

</div>

 ["いいえ", "はい", "そう", "ちがう"]}, {"en": "OK", "ja": "わかった・いいよ", "category": "あいさつ・表現", "options": ["わかった・いいよ", "だめ", "わからない", "むり"]}, {"en": "name", "ja": "なまえ", "category": "あいさつ・表現", "options": ["なまえ", "ねんれい", "じゅうしょ", "くに"]}, {"en": "age", "ja": "ねんれい", "category": "あいさつ・表現", "options": ["ねんれい", "なまえ", "たんじょうび", "しゅみ"]}, {"en": "birthday", "ja": "たんじょうび", "category": "あいさつ・表現", "options": ["たんじょうび", "きねんび", "やすみ", "まつり"]}, {"en": "hobby", "ja": "しゅみ", "category": "あいさつ・表現", "options": ["しゅみ", "とくぎ", "しごと", "きょうみ"]}, {"en": "holiday", "ja": "きゅうじつ", "category": "あいさつ・表現", "options": ["きゅうじつ", "へいじつ", "やすみ", "まつり"]}, {"en": "party", "ja": "パーティー", "category": "あいさつ・表現", "options": ["パーティー", "まつり", "イベント", "コンサート"]}, {"en": "present", "ja": "プレゼント", "category": "あいさつ・表現", "options": ["プレゼント", "おかし", "カード", "はな"]}, {"en": "letter", "ja": "てがみ", "category": "あいさつ・表現", "options": ["てがみ", "メール", "でんわ", "メッセージ"]}, {"en": "color", "ja": "いろ", "category": "あいさつ・表現", "options": ["いろ", "かたち", "おおきさ", "ながさ"]}, {"en": "picture", "ja": "えいが・え", "category": "あいさつ・表現", "options": ["えいが・え", "しゃしん", "ずあん", "イラスト"]}, {"en": "photo", "ja": "しゃしん", "category": "あいさつ・表現", "options": ["しゃしん", "え", "ポスター", "イラスト"]}];
const QUIZ_COUNT = 10;
let autoSpeak = true;
let questions = [];
let current = 0;
let answers = [];
let isSpeaking = false;
let synth = window.speechSynthesis;

// 初期化
window.addEventListener('load', () => {
  document.getElementById('word-count').textContent = WORDS.length;
  showTitle();
  if (synth) synth.getVoices(); // 音声リストを事前ロード
  if (synth && synth.onvoiceschanged !== undefined) synth.onvoiceschanged = () => synth.getVoices();
});

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function speak(text, cb) {
  if (!synth) { if(cb) cb(); return; }
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85;
  const voices = synth.getVoices();
  const v = voices.find(x => x.lang.startsWith('en') && x.localService) || voices.find(x => x.lang.startsWith('en'));
  if (v) u.voice = v;
  u.onstart = () => setSpeaking(true);
  u.onend   = () => { setSpeaking(false); if(cb) cb(); };
  u.onerror = () => { setSpeaking(false); if(cb) cb(); };
  synth.speak(u);
}

function setSpeaking(s) {
  isSpeaking = s;
  const card = document.getElementById('word-card');
  const wave = document.getElementById('wave');
  const icon = document.getElementById('speaker-icon');
  const label = document.getElementById('word-label');
  if (s) {
    card.classList.add('speaking');
    wave.classList.remove('hidden');
    icon.classList.add('hidden');
    label.textContent = '🔊 SPEAKING...';
  } else {
    card.classList.remove('speaking');
    wave.classList.add('hidden');
    icon.classList.remove('hidden');
    label.textContent = '👆 TAP TO LISTEN';
  }
}

function toggleAuto() {
  autoSpeak = !autoSpeak;
  const t = document.getElementById('toggle-auto');
  autoSpeak ? t.classList.add('on') : t.classList.remove('on');
}

function showScreen(id) {
  ['screen-title','screen-quiz','screen-result'].forEach(s => {
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}
function showTitle() { if(synth) synth.cancel(); showScreen('screen-title'); }

function startQuiz() {
  questions = shuffle(WORDS).slice(0, QUIZ_COUNT).map(q => ({ ...q, shuffled: shuffle(q.options) }));
  current = 0; answers = [];
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const pct = ((current + 1) / QUIZ_COUNT) * 100;
  document.getElementById('quiz-category').textContent = q.category;
  document.getElementById('quiz-progress').textContent = `${current+1} / ${QUIZ_COUNT}`;
  document.getElementById('quiz-bar').style.width = pct + '%';
  document.getElementById('word-text').textContent = q.en;
  document.getElementById('feedback').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');

  // 選択肢
  const grid = document.getElementById('options');
  grid.innerHTML = '';
  q.shuffled.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.textContent = opt;
    b.onclick = () => handleSelect(opt);
    grid.appendChild(b);
  });

  setSpeaking(false);
  if (autoSpeak) setTimeout(() => speak(q.en), 300);
}

function speakCurrent() {
  speak(questions[current].en);
}

function handleSelect(opt) {
  const q = questions[current];
  const ok = opt === q.ja;
  answers.push({ ...q, chosen: opt, correct: ok });

  // ボタン色変更
  document.querySelectorAll('.opt-btn').forEach(b => {
    b.disabled = true;
    if (b.textContent === q.ja) b.classList.add('correct');
    else if (b.textContent === opt && !ok) b.classList.add('wrong');
  });

  // フィードバック
  const fb = document.getElementById('feedback');
  const emojisOk  = ['🎉','✨','🌟','🎊','💯','🏆','👏','🥳'];
  const emojisNg  = ['💪','😢','ドンマイ！','次はできる！','もう一度！'];
  const emojis = ok ? emojisOk : emojisNg;
  const e = emojis[Math.floor(Math.random() * emojis.length)];
  fb.className = 'feedback ' + (ok ? 'correct' : 'wrong');
  fb.innerHTML = ok
    ? `${e} せいかい！`
    : `${e}<div style="font-size:14px;color:#5A7A9F;margin-top:4px;">こたえは「${q.ja}」だよ</div>`;
  fb.classList.remove('hidden');

  // 次へボタン
  const nb = document.getElementById('next-btn');
  nb.textContent = current + 1 >= QUIZ_COUNT ? '🏁 けっかを見る' : 'つぎへ →';
  nb.classList.remove('hidden');
}

function nextQuestion() {
  if (synth) synth.cancel();
  if (current + 1 >= QUIZ_COUNT) { showResult(); return; }
  current++;
  renderQuestion();
}

function showResult() {
  showScreen('screen-result');
  const score = answers.filter(a => a.correct).length;
  const pct = Math.round(score / QUIZ_COUNT * 100);
  const ranks = [
    { min:90, label:'かんぺき！',      emoji:'🏆', color:'#FFD700' },
    { min:70, label:'よくできました！', emoji:'🌟', color:'#4CAF82' },
    { min:50, label:'もう少し！',      emoji:'💪', color:'#60C8F5' },
    { min:0,  label:'れんしゅうしよう', emoji:'📚', color:'#FF6B6B' },
  ];
  const rank = ranks.find(r => pct >= r.min);
  document.getElementById('result-emoji').textContent = rank.emoji;
  document.getElementById('result-label').textContent = rank.label;
  document.getElementById('result-label').style.color = rank.color;
  document.getElementById('result-score').innerHTML = `${score}<span style="font-size:24px;color:#8AABCC;">/${QUIZ_COUNT}</span>`;
  document.getElementById('result-pct').textContent = `正解率 ${pct}%`;
  document.getElementById('result-pct').style.color = rank.color;
  document.getElementById('result-total').textContent = `${WORDS.length}語から毎回ランダム出題`;

  const rows = document.getElementById('answer-rows');
  rows.innerHTML = '';
  answers.forEach(a => {
    const row = document.createElement('div');
    row.className = 'answer-row';
    row.innerHTML = `
      <span class="answer-en" onclick="speak('${a.en}')">🔊 ${a.en}</span>
      <span class="answer-ja">→ ${a.ja}</span>
      <span>${a.correct ? '⭕' : '❌'}</span>`;
    rows.appendChild(row);
  });
}
</script>
